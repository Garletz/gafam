name: Debug Production Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  debug-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Pull and Run Image
        run: |
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$REPO_LOWERCASE:latest"
          docker pull $IMAGE
          
          docker run -d --name gafam-test -p 5150:5150 -e JWT_SECRET="test_secret_123" $IMAGE
          sleep 5
          
          docker logs gafam-test > docker-crash.log 2>&1
          curl -v http://localhost:5150/api/_ping >> docker-crash.log 2>&1 || true
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout -b debug-logs || git checkout debug-logs
          git add docker-crash.log
          git commit -m "Add docker logs" || true
          git push -f origin debug-logs
