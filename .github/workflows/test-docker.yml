name: Test Go Docker Run

on:
  push:
    branches: [ "main" ]

jobs:
  test-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t test-gafam ./vpc-relay
      - name: Run Docker Image
        run: |
          docker run -d --name test-api -p 5150:5150 test-gafam
          sleep 5
          docker logs test-api > docker-crash.log
          curl -v http://localhost:5150/api/_ping >> docker-crash.log 2>&1 || true
      - name: Commit logs
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add docker-crash.log
          git commit -m "Add crash logs"
          git push origin main || true
